<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaioTECA | Tu Biblioteca Digital Premium</title>
    <meta name="description"
        content="Explora una colección curada de libros en DaioTECA, tu biblioteca digital moderna.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav>
        <div class="logo">DaioTECA</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por título o autor...">
        </div>
        <div class="user-controls">
            <button id="loginBtn" class="filter-btn">Iniciar Sesión</button>
            <div id="userProfile" class="user-profile hidden">
                <span id="usernameDisplay">Nombre</span>
                <button id="logoutBtn" class="logout-btn">Salir</button>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>Descubre tu próxima aventura</h1>
            <p>Explora nuestra biblioteca digital con los mejores títulos de ciencia ficción, tecnología, misterio y
                más.</p>
        </section>

        <section class="filters" id="categoryFilters">
            <div class="filter-group">
                <button class="filter-btn active" data-category="all">Todos</button>
                <button class="filter-btn" data-category="sci-fi">Ciencia Ficción</button>
                <button class="filter-btn" data-category="mystery">Misterio</button>
                <button class="filter-btn" data-category="fantasy">Fantasía</button>
                <button class="filter-btn" data-category="tech">Tecnología</button>
                <button class="filter-btn" data-category="drama">Drama</button>
            </div>
            <div class="filter-divider"></div>
            <button class="filter-btn" id="myLibraryBtn" data-category="library">📚 Mi Biblioteca</button>
        </section>

        <section class="book-grid" id="bookGrid">
            <!-- Books will be rendered here via JS -->
            <div class="loading">Cargando biblioteca...</div>
        </section>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Inicio de Sesión</h2>
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" required placeholder="Escribe tu nombre...">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Escribe tu contraseña...">
                </div>
                <div id="authError" class="auth-error hidden">Credenciales incorrectas</div>
                <div class="form-actions">
                    <button type="button" id="closeModal" class="filter-btn">Cancelar</button>
                    <button type="submit" class="filter-btn active">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reader Modal -->
    <div id="readerModal" class="modal reader-modal">
        <div class="reader-content">
            <div class="reader-header">
                <h2 id="readerTitle">Título del Libro</h2>
                <div class="reader-controls">
                    <button id="ttsBtn" class="control-btn">🔊 Narrar</button>
                    <button id="decreaseFont" class="control-btn">A-</button>
                    <button id="increaseFont" class="control-btn">A+</button>
                    <button id="closeReader" class="filter-btn">Cerrar</button>
                </div>
            </div>
            <div id="bookText" class="book-text">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
